<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bakery Contact Form</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Delius&family=Felipa&family=Kaushan+Script&family=Story+Script&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Delius&family=Felipa&family=Kaushan+Script&family=Pacifico&family=Story+Script&display=swap" rel="stylesheet">

    <body>
        
        <div class="contact">
            <form class="contact_content">
                <h1>Contact Us</h1>
                <label>Name</label><input type="text" required>
                <label>Email</label><input type="email" required>
                <label>Phone Number</label><input type="number" required>
                <textarea rows="10" placeholder="Type your message here."></textarea>
                <button type="submit">Send Your Message</button>
            </form>
            <h2>~"The best things in life are sweet"~</h2>
        </div>
      

    </body>
    
</html>
